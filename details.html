<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Watch Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0d0d0d;
color:white;
}

.navbar{
background:black;
}

.navbar-brand{
color:#d4af37 !important;
font-weight:bold;
}

.btn-gold{
background:#d4af37;
color:black;
font-weight:bold;
}

.gallery img{
height:100px;
width:100%;
object-fit:cover;
cursor:pointer;
border:2px solid #d4af37;
}

.main-img{
height:450px;
width:100%;
object-fit:cover;
border-radius:10px;
}

table{
color:white !important;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">
<div class="container">
<a class="navbar-brand" href="index.html">TIMEPIECE</a>
</div>
</nav>

<div class="container mt-5">

<div class="row">

<div class="col-md-6">

<img id="mainImage"
class="main-img"
src="https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=800">

<div class="row mt-3 gallery">

<div class="col-4">
<img src="https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=800"
onclick="changeImage(this.src)">
</div>

<div class="col-4">
<img src="https://images.unsplash.com/photo-1522312346375-d1a52e2b99b3?w=800"
onclick="changeImage(this.src)">
</div>

<div class="col-4">
<img src="https://images.unsplash.com/photo-1434056886845-dac89ffe9b56?w=800"
onclick="changeImage(this.src)">
</div>

</div>

</div>

<div class="col-md-6">

<h1>Chrono Black Watch</h1>

<h2 class="text-warning">$199</h2>

<p>
Luxury premium watch with stainless steel body and water resistance.
</p>

<table class="table table-dark">

<tr>
<th>Brand</th>
<td>Timepiece</td>
</tr>

<tr>
<th>Model</th>
<td>Chrono Black</td>
</tr>

<tr>
<th>Material</th>
<td>Stainless Steel</td>
</tr>

<tr>
<th>Water Resistant</th>
<td>50m</td>
</tr>

<tr>
<th>Warranty</th>
<td>2 Years</td>
</tr>

</table>

<button class="btn btn-gold btn-lg"
onclick="addToCart()">
Add To Cart
</button>

</div>

</div>

</div>

<script>

function changeImage(src){
document.getElementById("mainImage").src=src;
}

function addToCart(){

localStorage.setItem("product","Chrono Black");
localStorage.setItem("price","199");

alert("Added To Cart");

}

</script>

</body>
</html>
