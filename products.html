<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Products - Timepiece Watches</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0d0d0d;
color:white;
}

.navbar{
background:black;
}

.navbar-brand{
color:#d4af37 !important;
font-weight:bold;
font-size:28px;
}

.card{
background:#1b1b1b;
transition:.3s;
border:none;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
height:250px;
object-fit:cover;
}

.price{
color:#d4af37;
font-size:22px;
font-weight:bold;
}

.btn-gold{
background:#d4af37;
color:black;
}

h2{
color:#d4af37;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">
<div class="container">

<a class="navbar-brand" href="index.html">TIMEPIECE</a>

<div class="navbar-nav ms-auto">

<a class="nav-link text-white" href="index.html">Home</a>

<a class="nav-link text-white" href="products.html">Products</a>

<a class="nav-link text-white" href="cart.html">Cart</a>

<a class="nav-link text-white" href="about.html">About</a>

</div>

</div>
</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">Luxury Watches Collection</h2>

<input
type="text"
id="search"
class="form-control mb-4"
placeholder="Search Watches..."
onkeyup="searchProduct()"
>

<div class="text-center mb-4">

<button class="btn btn-gold m-1"
onclick="filterCategory('all')">
All
</button>

<button class="btn btn-gold m-1"
onclick="filterCategory('Luxury')">
Luxury
</button>

<button class="btn btn-gold m-1"
onclick="filterCategory('Sport')">
Sport
</button>

<button class="btn btn-gold m-1"
onclick="filterCategory('Classic')">
Classic
</button>

</div>

<div class="row" id="productContainer">

<!-- Product 1 -->

<div class="col-md-4 mb-4 product Luxury">

<div class="card">

<img src="https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=500">

<div class="card-body text-center">

<h5>Chrono Black</h5>

<p class="price">$199</p>

<a href="details.html" class="btn btn-gold">
View Details
</a>

</div>

</div>

</div>

<!-- Product 2 -->

<div class="col-md-4 mb-4 product Classic">

<div class="card">

<img src="https://images.unsplash.com/photo-1522312346375-d1a52e2b99b3?w=500">

<div class="card-body text-center">

<h5>Silver Elegance</h5>

<p class="price">$149</p>

<a href="details.html" class="btn btn-gold">
View Details
</a>

</div>

</div>

</div>

<!-- Product 3 -->

<div class="col-md-4 mb-4 product Sport">

<div class="card">

<img src="https://images.unsplash.com/photo-1434056886845-dac89ffe9b56?w=500">

<div class="card-body text-center">

<h5>Sport Pro</h5>

<p class="price">$129</p>

<a href="details.html" class="btn btn-gold">
View Details
</a>

</div>

</div>

</div>

</div>

</div>

<script>

function searchProduct(){

let input =
document.getElementById("search")
.value.toLowerCase();

let cards =
document.querySelectorAll(".product");

cards.forEach(card=>{

let title=
card.innerText.toLowerCase();

if(title.includes(input))
card.style.display="block";
else
card.style.display="none";

});

}

function filterCategory(category){

let cards =
document.querySelectorAll(".product");

cards.forEach(card=>{

if(category=="all")
card.style.display="block";

else if(card.classList.contains(category))
card.style.display="block";

else
card.style.display="none";

});

}

</script>

</body>
</html>
